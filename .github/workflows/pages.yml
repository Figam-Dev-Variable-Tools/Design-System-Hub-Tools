name: Deploy TDS docs to GitHub Pages
# TDS 문서 사이트(Storybook) + 디자인시스템 선언(manifest/tokens/docs-content)을
# GitHub Pages로 공개 배포한다. Figma 플러그인이 이 URL을 읽어 디자인시스템을 생성한다.
# (자체 구축 story.to.design — 외부 SaaS 불필요)
on:
  push:
    branches: [main]
  # 게이트는 **머지 전에** 걸려야 의미가 있다 — PR 에서도 돌린다(배포는 main 에서만).
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # false: 연속 push 시 중간 배포가 취소되지 않고 순차 배포 → 항상 최신 커밋이 라이브에 반영.
  # (true면 재배포 취소로 라이브가 옛 커밋에 머물러 스토리 청크 해시 불일치 404가 남는다)
  cancel-in-progress: false

jobs:
  # ── 검증 게이트 ────────────────────────────────────────────────────────
  # 이 job 이 없던 동안, CLAUDE.md 가 "끝내기 전에 반드시" 돌리라는 6개 게이트는
  # **사람/에이전트가 로컬에서 기억해서 돌려야만** 걸렸다. 안 돌려도 typecheck 만 초록이면
  # 그대로 Pages 에 배포됐다 — 이 저장소가 이미 겪은 "되돌아간 파일도 타입체크는 통과해서
  # 아무도 몰랐다"와 **똑같은 종류의 맹점**이다. 기억이 아니라 CI 가 강제한다.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # typecheck ×2 · parity · mapping · naming · screens · bindings · guard
      - run: pnpm verify:all

  build:
    needs: verify # 게이트가 빨간 코드는 배포되지 않는다
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pages를 자동 활성화(Settings 수동 설정 없이도 동작). Source가 'Deploy from a branch'로
      # 잘못 설정돼 있어도 이 단계가 'GitHub Actions' 빌드 타입으로 전환한다.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:manifest
      # 랜딩의 수치(컴포넌트·세트·화면·아이콘·게이트)를 소스에서 계산 → docs/ds-stats.json
      - run: pnpm build:stats
      - run: pnpm build-storybook
      - name: 사이트 조립 — 랜딩(/) + 컴포넌트 문서(/docs/) + Storybook(/storybook/) + 선언 파일
        run: |
          mkdir -p _site/storybook
          cp -r storybook-static/* _site/storybook/
          cp site/index.html _site/index.html
          # 커스텀 개발자 문서(Toss-docs 스타일) — Storybook iframe 프리뷰를 자체 셸로 감싼다.
          mkdir -p _site/docs
          cp -r site/docs/* _site/docs/
          # 선언 파일(Figma 플러그인/도구가 읽는 URL) — 루트와 /storybook/ 양쪽에 둔다(하위호환)
          cp packages/figma-story-tools/manifest.json _site/manifest.json
          cp packages/figma-story-tools/manifest.json _site/storybook/manifest.json
          mkdir -p _site/tokens _site/storybook/tokens
          cp tokens/*.json _site/tokens/
          cp tokens/*.json _site/storybook/tokens/
          cp docs/docs-content.json _site/docs-content.json
          cp docs/docs-content.json _site/storybook/docs-content.json
          # 랜딩이 fetch 로 읽는 통계(빌드 때 소스에서 계산 — 하드코딩 금지)
          cp docs/ds-stats.json _site/ds-stats.json
          touch _site/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with: { path: _site }

  deploy:
    needs: build
    # PR 에서는 게이트만 돌리고 배포하지 않는다 — 라이브는 main 만 바꾼다.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
